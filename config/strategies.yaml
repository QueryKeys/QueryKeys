# ============================================================
# Strategy Marketplace Configuration
# Each strategy can be enabled/disabled and tuned independently
# ============================================================

strategies:
  - name: "ensemble_edge"
    enabled: true
    class: "src.strategies.ensemble_edge.EnsembleEdgeStrategy"
    params:
      min_edge: 0.03
      min_confidence: 0.55
      kelly_fraction: 0.25
      max_position_pct: 0.08
    markets: "all"

  - name: "sentiment_momentum"
    enabled: true
    class: "src.strategies.sentiment_momentum.SentimentMomentumStrategy"
    params:
      sentiment_threshold: 0.6
      momentum_window: 12         # hours
      min_volume_spike: 2.0       # 2x average
      kelly_fraction: 0.15
      max_position_pct: 0.05
    markets: "all"

  - name: "mean_reversion"
    enabled: false
    class: "src.strategies.mean_reversion.MeanReversionStrategy"
    params:
      zscore_threshold: 2.0
      lookback_hours: 48
      kelly_fraction: 0.10
      max_position_pct: 0.04
    markets: "all"

  - name: "arbitrage"
    enabled: true
    class: "src.strategies.arbitrage.ArbitrageStrategy"
    params:
      min_arb_edge: 0.02
      max_position_pct: 0.05
    markets: "all"

  - name: "high_conviction_blitz"
    enabled: true
    class: "src.strategies.high_conviction_blitz.HighConvictionBlitzStrategy"
    params:
      min_net_edge: 0.12          # only signals with 12%+ edge
      min_confidence: 0.75        # high model agreement
      max_uncertainty: 0.08       # models must agree tightly
      min_volume_24h: 10000       # liquid markets only
      max_dte: 14                 # short duration
      min_price_gap: 0.10         # model vs market gap >= 10%
      kelly_fraction: 0.75        # 75% Kelly — aggressive
      max_position_pct: 0.25      # max 25% per trade
    markets: "all"

  - name: "weekly_cycle"
    enabled: true
    class: "src.strategies.weekly_cycle.WeeklyCycleStrategy"
    params:
      min_net_edge: 0.04          # slightly higher bar than ensemble_edge
      min_confidence: 0.58
      max_uncertainty: 0.12
      min_dte: 1
      max_dte: 7                  # only weekly-resolution markets
      min_volume_24h: 3000        # skip illiquid markets
      allowed_weekdays: [0,1,2,3,4]   # Mon–Fri only
      avoid_utc_hours: [0,1,2,3,4,5]  # skip dead-liquidity window
      base_position_pct: 0.05
      max_position_pct: 0.09
    markets: "all"

  - name: "late_resolution_convergence"
    enabled: true
    class: "src.strategies.late_resolution_convergence.LateResolutionConvergenceStrategy"
    params:
      min_dte: 1
      max_dte: 14
      min_conviction: 0.68        # model_prob must exceed this toward YES or NO
      min_price_gap: 0.07         # market price must lag model by at least 7%
      min_confidence: 0.55
      max_uncertainty: 0.12
      min_net_edge: 0.03
      base_position_pct: 0.06     # 6% bankroll base, scales up near expiry
      max_position_pct: 0.10
    markets: "all"
